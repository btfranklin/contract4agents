name: Create Draft Release

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write

jobs:
    draft-release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0
            - name: Generate release notes
              uses: btfranklin/release-notes-scribe@v0
              with:
                  openai_api_key: ${{ secrets.OPENAI_API_KEY }}
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  include_github_generated_notes: "true"
            - name: Set up Node
              uses: actions/setup-node@v7
              with:
                  node-version: "22"
            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"
            - name: Install PDM
              uses: pdm-project/setup-pdm@v4
              with:
                  cache: true
                  cache-dependency-path: pdm.lock
            - name: Test language server boundary
              run: |
                  pdm install --group dev
                  pdm run pytest tests/unit/test_language_server.py
            - name: Build VS Code release asset
              working-directory: editors/vscode
              run: |
                  npm ci
                  npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"
                  npm test
                  npm run package
            - name: Upload VSIX release asset
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release upload "$GITHUB_REF_NAME" \
                      editors/vscode/dist/contract4agents-vscode-*.vsix \
                      --clobber
