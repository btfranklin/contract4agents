name: VS Code extension

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

permissions:
    contents: read

jobs:
    package:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - name: Set up Node
              uses: actions/setup-node@v7
              with:
                  node-version: "22"
                  cache: npm
                  cache-dependency-path: editors/vscode/package-lock.json
            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"
            - name: Install PDM
              uses: pdm-project/setup-pdm@v4
              with:
                  cache: true
                  cache-dependency-path: pdm.lock
            - name: Install dependencies
              run: |
                  pdm install --group dev
                  npm ci --prefix editors/vscode
            - name: Test language server boundary
              run: pdm run pytest tests/unit/test_language_server.py
            - name: Test extension
              run: npm test --prefix editors/vscode
            - name: Package VSIX
              run: npm run package --prefix editors/vscode
            - name: Upload VSIX artifact
              uses: actions/upload-artifact@v7
              with:
                  name: contract4agents-vscode-vsix
                  path: editors/vscode/dist/*.vsix
                  if-no-files-found: error
